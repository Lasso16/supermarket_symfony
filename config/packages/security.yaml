security:
  # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
      algorithm: auto
      cost: 4 # Lowest possible value for bcrypt
      time_cost: 3 # Lowest possible value for argon
      memory_cost: 10 # Lowest possible value for argon
  # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
  providers:
    app_user_provider:
      entity:
        class: App\Entity\Usuario
        property: nombreUsuario
  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false
    api_login:
      pattern: ^/api/v1/auth/login
      stateless: true
      json_login:
        check_path: /api/v1/auth/login_check
        success_handler: lexik_jwt_authentication.handler.authentication_success
        failure_handler: lexik_jwt_authentication.handler.authentication_failure
    api:
      pattern: ^/api/v1
      stateless: true
      jwt: ~
    main:
      lazy: true
      provider: app_user_provider
      form_login:
        login_path: app_login
        check_path: app_login
        default_target_path: app_home
        enable_csrf: true
      logout:
        path: app_logout
        # where to redirect after logout
        target: app_home

      # activate different ways to authenticate
      # https://symfony.com/doc/current/security.html#the-firewall

      # https://symfony.com/doc/current/security/impersonating_user.html
      # switch_user: true

  # Easy way to control access for large sections of your site
  # Note: Only the *first* access control that matches will be used
  access_control:
    # API
    - { path: ^/api/v1/auth/(login|register), roles: PUBLIC_ACCESS }
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

    # Web - Páginas públicas
    - { path: ^/$, roles: PUBLIC_ACCESS }
    - { path: ^/login, roles: PUBLIC_ACCESS }
    - { path: ^/captcha, roles: PUBLIC_ACCESS }
    - { path: ^/sobre-nosotros$, roles: PUBLIC_ACCESS }
    - { path: ^/contacto$, roles: PUBLIC_ACCESS }
    - { path: ^/blog$, roles: PUBLIC_ACCESS }
    - { path: ^/producto$, roles: PUBLIC_ACCESS }
    - { path: ^/producto/detalle/, roles: PUBLIC_ACCESS }

    # Registro Web
    - { path: ^/register, roles: PUBLIC_ACCESS }
    - { path: ^/logout, roles: IS_AUTHENTICATED_FULLY }

    # Mis productos
    - { path: ^/mis-productos, roles: ROLE_USER }

    # Admin
    - { path: ^/admin, roles: ROLE_ADMIN }

    # Usuario
    - { path: ^/carrito, roles: ROLE_USER }
    - { path: ^/compra, roles: ROLE_USER }
    - { path: ^/perfil, roles: ROLE_USER }
    - { path: ^/dashboard, roles: ROLE_USER }

    # Cualquier otra ruta requiere autenticación
    - { path: ^/, roles: ROLE_USER }

  role_hierarchy:
    ROLE_ADMIN: ROLE_USER
    ROLE_SUPER_ADMIN: [ROLE_ADMIN, ROLE_ALLOWED_TO_SWITCH]

when@test:
  security:
    password_hashers:
      # By default, password hashers are resource intensive and take time. This is
      # important to generate secure password hashes. In tests however, secure hashes
      # are not important, waste resources and increase test times. The following
      # reduces the work factor to the lowest possible values.
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4 # Lowest possible value for bcrypt
        time_cost: 3 # Lowest possible value for argon
        memory_cost: 10 # Lowest possible value for argon
